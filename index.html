<!DOCTYPE html>
<html lang="en">
<head>
  <title>พิซซ่าหน้าแน่น</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    /* 1. บังคับให้ความสูงหน้าเว็บสูงเท่ากับหน้าจออุปกรณ์ (vh = viewport height) */
    html, body {
      height: 100%;
      margin: 0;
    }
    body { 
      background-color: #fff9c4; 
      display: flex;
      flex-direction: column; /* จัดเนื้อหาเป็นแนวตั้ง หัว -> กลาง -> ท้าย */
    }
    
    .nav-item { margin-left: 10px; }

    /* 2. ส่วนนี้คือพระเอก! flex: 1 จะทำให้มันยืดพื้นที่เพื่อดัน Footer ลงไปข้างล่างสุดเสมอ */
    .content-wrapper {
      flex: 1 0 auto;
    }

    /* 3. สไตล์ Footer สีแดง */
    footer {
      background-color: #dc3545;
      color: white;
      text-align: center;
      padding: 1.5rem 0; /* เพิ่มพื้นที่ให้แถบสีแดงดูหนาและสวยเหมือนในรูปตัวอย่าง */
      flex-shrink: 0;
    }

    /* ปรับขนาดรูปให้พอดีกับหน้าจอมือถือ ไม่ให้รูปใหญ่เกินจนล้น */
    .img-pizza {
      max-width: 90%; /* รูปจะไม่เกินความกว้างหน้าจอ */
      height: auto;
    }
  </style>
</head>
<body>

  <div class="content-wrapper">
    <nav class="navbar navbar-expand-sm bg-warning navbar-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="#">ชา นอ มอ พิซซ่าหน้าแน่น</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto"> 
            <li class="nav-item"><a class="nav-link bg-danger text-white px-4 rounded-pill active" href="#">หน้าหลัก</a></li>
            <li class="nav-item"><a class="nav-link bg-danger text-white px-4 rounded-pill active" href="#">เมนู</a></li>
            <li class="nav-item"><a class="nav-link bg-danger text-white px-4 rounded-pill active" href="#">ราคา</a></li>
            <li class="nav-item"><a class="nav-link bg-danger text-white px-4 rounded-pill active" href="#">ตำแหน่งที่ตั้ง</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-5 text-center">
      <img src="20251213_114141.jpg" class="rounded shadow-lg img-pizza" alt="Pizza"> 
    </div>
  </div>

  <footer>
    <div class="container">
      <p class="mb-1 fw-bold">เปิด 10.00 - 18.30น.</p>
      <p class="mb-0">โทร: 091-0366243</p>
    </div>
  </footer>

</body>
</html>
