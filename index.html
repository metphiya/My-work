<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>หน้าเว็บของเธอ โดยมีนาย</title>
    <style>
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h1>สวัสดีครับ</h1>
        <p>นี่คือหน้าเว็บที่ "มีนาย" ตั้งใจเขียนให้คุณ</p>
        <p>หวังว่าจะถูกใจนะครับ</p>
    </div>

</body>
</html>
